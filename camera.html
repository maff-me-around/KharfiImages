<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SCATTA</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --pink:#ff2060; --dark:#05050a; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    background:var(--dark); color:#fff; font-family:'Syne',sans-serif;
    height:100dvh; overflow:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }

  .screen { display:none; flex-direction:column; align-items:center; width:100%; height:100%; }
  .screen.active { display:flex; }

  /* LOADING */
  #screen-loading { justify-content:center; gap:20px; }
  .brand { font-family:'Bebas Neue',sans-serif; font-size:clamp(48px,16vw,80px); letter-spacing:0.1em; color:#fff; line-height:1; text-align:center; }
  .brand em { color:var(--pink); font-style:normal; }
  .spinner { width:28px; height:28px; border:2px solid rgba(255,255,255,0.08); border-top-color:var(--pink); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .status-text { font-size:11px; letter-spacing:0.25em; text-transform:uppercase; color:rgba(255,255,255,0.3); }

  /* CAMERA */
  #screen-camera { justify-content:flex-start; position:relative; }
  #viewfinder { width:100%; flex:1; object-fit:cover; background:#000; transform:scaleX(-1); }
  .cam-hint { font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:rgba(255,255,255,0.3); text-align:center; position:absolute; top:14px; left:50%; transform:translateX(-50%); white-space:nowrap; }
  .cam-ui { width:100%; padding:24px 24px 36px; display:flex; align-items:center; justify-content:center; background:var(--dark); }
  .shutter { width:72px; height:72px; border-radius:50%; background:#fff; border:3px solid rgba(255,255,255,0.15); position:relative; cursor:pointer; transition:transform 0.1s,background 0.1s; box-shadow:0 0 0 6px rgba(255,255,255,0.08); }
  .shutter:active { transform:scale(0.9); background:#ddd; }
  .shutter::after { content:''; position:absolute; inset:8px; border-radius:50%; background:var(--pink); }

  /* PREVIEW */
  #screen-preview { justify-content:center; gap:0; }
  #preview-img { width:100%; flex:1; object-fit:cover; transform:scaleX(-1); }
  .preview-actions { width:100%; padding:20px 24px 36px; display:flex; gap:12px; background:var(--dark); }
  .btn { flex:1; padding:16px 12px; border:none; border-radius:6px; cursor:pointer; font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:0.15em; transition:transform 0.1s,opacity 0.1s; }
  .btn:active { transform:scale(0.96); }
  .btn-retry { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.6); }
  .btn-send  { background:var(--pink); color:#fff; box-shadow:0 0 30px rgba(255,32,96,0.4); }
  .btn-send:disabled { opacity:0.5; pointer-events:none; }

  /* SUCCESS */
  #screen-success { justify-content:center; gap:20px; }
  .check { width:72px; height:72px; border-radius:50%; background:rgba(255,32,96,0.12); border:2px solid var(--pink); display:flex; align-items:center; justify-content:center; animation:popIn 0.5s cubic-bezier(0.34,1.5,0.64,1) forwards; }
  @keyframes popIn { from{transform:scale(0)} to{transform:scale(1)} }
  .check svg { width:34px; height:34px; }
  .success-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(42px,13vw,72px); letter-spacing:0.08em; text-align:center; }
  .success-sub { font-size:12px; letter-spacing:0.2em; text-transform:uppercase; color:rgba(255,255,255,0.3); text-align:center; }
  .btn-another { margin-top:12px; padding:14px 36px; background:transparent; border:1px solid rgba(255,32,96,0.5); color:var(--pink); border-radius:6px; cursor:pointer; font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:0.15em; }

  /* ERROR */
  #screen-error { justify-content:center; gap:16px; padding:32px; text-align:center; }
  .err-title { font-family:'Bebas Neue',sans-serif; font-size:36px; letter-spacing:0.1em; color:var(--pink); }
  .err-sub { font-size:13px; color:rgba(255,255,255,0.4); line-height:1.6; }

  canvas { display:none; }
</style>
</head>
<body>

<div id="screen-loading" class="screen active">
  <div class="brand">SHOOT<br>THE <em>NIGHT</em></div>
  <div class="spinner"></div>
  <div class="status-text">Caricamento…</div>
</div>

<div id="screen-camera" class="screen">
  <div class="cam-hint">PUNTA &amp; SCATTA</div>
  <video id="viewfinder" autoplay playsinline muted></video>
  <div class="cam-ui">
    <button class="shutter" id="shutter-btn" aria-label="Scatta foto"></button>
  </div>
</div>

<div id="screen-preview" class="screen">
  <img id="preview-img" src="" alt="Anteprima">
  <div class="preview-actions">
    <button class="btn btn-retry" id="retry-btn">RIPROVA</button>
    <button class="btn btn-send" id="send-btn">INVIA</button>
  </div>
</div>

<div id="screen-success" class="screen">
  <div class="check">
    <svg viewBox="0 0 24 24" fill="none" stroke="#ff2060" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>
  <div class="success-title">FOTO<br>INVIATA!</div>
  <div class="success-sub">Guardala sul grande schermo</div>
  <button class="btn-another" id="another-btn">SCATTANE UN'ALTRA</button>
</div>

<div id="screen-error" class="screen">
  <div class="err-title">OPS!</div>
  <div class="err-sub" id="err-msg">Qualcosa è andato storto.<br>Prova ad aggiornare la pagina.</div>
</div>

<canvas id="snap-canvas"></canvas>

<script>
// ── CONFIG ───────────────────────────────────────────
const MAX_PX   = 800;   // lato lungo massimo in pixel
const QUALITY  = 0.60;  // qualità JPEG (0–1) — ~80KB risultante

// ── UTILS ────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showError(msg) {
  document.getElementById('err-msg').innerHTML = msg;
  showScreen('screen-error');
}

// ── GET FIREBASE URL FROM QR PARAM ───────────────────
const params = new URLSearchParams(location.search);
const dbUrl  = params.get('db');

if (!dbUrl) {
  showError('QR Code non valido.<br>Scansiona il QR sul grande schermo.');
} else {
  startCamera();
}

// ── CAMERA ───────────────────────────────────────────
let stream, lastDataUrl;

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'user', width:{ideal:1280}, height:{ideal:1280} },
      audio: false
    });
    document.getElementById('viewfinder').srcObject = stream;
    showScreen('screen-camera');
  } catch(e) {
    showError('Fotocamera non accessibile.<br>Controlla i permessi del browser.');
  }
}

// ── SHUTTER ──────────────────────────────────────────
document.getElementById('shutter-btn').addEventListener('click', () => {
  const video  = document.getElementById('viewfinder');
  const canvas = document.getElementById('snap-canvas');
  const ctx    = canvas.getContext('2d');

  // Calcola dimensioni ridimensionate
  let w = video.videoWidth  || 640;
  let h = video.videoHeight || 640;
  if (w > MAX_PX || h > MAX_PX) {
    const scale = MAX_PX / Math.max(w, h);
    w = Math.round(w * scale);
    h = Math.round(h * scale);
  }

  canvas.width  = w;
  canvas.height = h;

  // Mirror selfie
  ctx.translate(w, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0, w, h);

  lastDataUrl = canvas.toDataURL('image/jpeg', QUALITY);
  document.getElementById('preview-img').src = lastDataUrl;
  showScreen('screen-preview');
});

document.getElementById('retry-btn').addEventListener('click', () => showScreen('screen-camera'));

// ── SEND ─────────────────────────────────────────────
document.getElementById('send-btn').addEventListener('click', async () => {
  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  btn.textContent = 'INVIO…';

  try {
    const res = await fetch(`${dbUrl}/photos.json`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ dataUrl: lastDataUrl, ts: Date.now() })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    showScreen('screen-success');
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'INVIA';
    alert('Errore invio. Controlla la connessione e riprova.');
  }
});

// ── ANOTHER ──────────────────────────────────────────
document.getElementById('another-btn').addEventListener('click', () => {
  document.getElementById('send-btn').disabled = false;
  document.getElementById('send-btn').textContent = 'INVIA';
  showScreen('screen-camera');
});
</script>
</body>
</html>
