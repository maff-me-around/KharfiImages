<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WALL</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width:100%; height:100%;
    background:#111;
    overflow:hidden;
    font-family:'Courier New', monospace;
  }

  /* ── CANVAS AREA ── */
  #canvas {
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%, -50%);
    background:#00B140;
    overflow:hidden;
    /* border Win95 style */
    border-top:3px solid #fff;
    border-left:3px solid #fff;
    border-right:3px solid #404040;
    border-bottom:3px solid #404040;
    box-shadow:3px 3px 0 #000, 0 0 0 1px #000;
  }

  /* ── WAIT SCREEN ── */
  #wait-screen {
    position:fixed; inset:0; z-index:9000;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
    background:#111; transition:opacity 0.8s ease;
  }
  #wait-screen.hidden { opacity:0; pointer-events:none; }
  .qr-wrap {
    background:#fff; padding:16px;
    border-top:2px solid #fff; border-left:2px solid #fff;
    border-right:2px solid #404040; border-bottom:2px solid #404040;
    box-shadow:2px 2px 0 #000; display:inline-block; line-height:0;
  }
  #qr-img { display:block; width:min(60vmin, 420px); height:min(60vmin, 420px); }

  /* ── WIN95 ── */
  .win95 {
    background:#c0c0c0;
    border-top:2px solid #fff; border-left:2px solid #fff;
    border-right:2px solid #404040; border-bottom:2px solid #404040;
    box-shadow:2px 2px 0 #000;
  }
  .win95-bar {
    background:linear-gradient(90deg,#000080,#1084d0);
    color:#fff; padding:2px 4px;
    display:flex; align-items:center; justify-content:space-between;
    font-size:11px; font-weight:bold;
    user-select:none; white-space:nowrap; overflow:hidden;
  }
  .win95-bar-left { display:flex; align-items:center; gap:3px; overflow:hidden; }
  .win95-dot { width:12px; height:12px; flex-shrink:0; background:#ff2060; display:inline-block; }
  .win95-bar-left span:last-child { overflow:hidden; text-overflow:ellipsis; }
  .win95-btns { display:flex; gap:2px; flex-shrink:0; }
  .win95-btn {
    width:15px; height:13px; background:#c0c0c0;
    border-top:1px solid #fff; border-left:1px solid #fff;
    border-right:1px solid #404040; border-bottom:1px solid #404040;
    font-size:8px; display:flex; align-items:center; justify-content:center; color:#000;
  }
  .win95-body {
    border-top:2px solid #404040; border-left:2px solid #404040;
    border-right:2px solid #fff; border-bottom:2px solid #fff;
    padding:2px; background:#c0c0c0; line-height:0; overflow:hidden;
  }
  .win95-body img { display:block; width:100%; height:100%; object-fit:cover; }

  /* ── FLOATING CARDS ── */
  .photo-card {
    position:absolute;
    transform-origin:center center;
    /* transition only for scale changes from slider, NOT for position (handled by JS) */
    transition:transform 0.35s ease;
    will-change:transform, left, top;
  }
  .photo-card.dying {
    transition:opacity 1.5s ease, transform 1.5s ease !important;
    opacity:0 !important;
    transform:scale(0.6) !important;
  }

  /* ── FLASH ── */
  #flash { position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:850; transition:opacity .05s; }
  #flash.on { opacity:.1; }

  /* ── COUNTER ── */
  #counter {
    position:fixed; top:12px; right:16px; z-index:950;
    font-family:'Courier New',monospace; font-size:11px; color:rgba(255,255,255,0.4);
  }
  #counter b { color:#fff; }

  /* ── CONTROL PANEL ── */
  #ctrl-panel {
    position:fixed; bottom:12px; left:50%; transform:translateX(-50%);
    z-index:950;
  }
  .ctrl-win {
    background:#c0c0c0;
    border-top:2px solid #fff; border-left:2px solid #fff;
    border-right:2px solid #404040; border-bottom:2px solid #404040;
    box-shadow:2px 2px 0 #000;
  }
  .ctrl-bar {
    background:linear-gradient(90deg,#000080,#1084d0);
    color:#fff; padding:2px 6px; font-size:11px; font-weight:bold;
    display:flex; align-items:center; gap:4px;
  }
  .ctrl-body {
    padding:6px 10px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;
  }
  .cf { display:flex; align-items:center; gap:4px; font-size:11px; color:#000; white-space:nowrap; }
  .cf input[type=number] {
    width:52px; padding:1px 3px; background:#fff; font-family:'Courier New',monospace; font-size:11px;
    border-top:2px solid #404040; border-left:2px solid #404040;
    border-right:2px solid #fff; border-bottom:2px solid #fff; outline:none;
  }
  .cf input[type=range] {
    width:90px; -webkit-appearance:none; appearance:none; height:4px;
    background:#808080; border-top:1px solid #404040; border-left:1px solid #404040;
    border-right:1px solid #fff; border-bottom:1px solid #fff; outline:none; cursor:pointer;
  }
  .cf input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; width:11px; height:18px; background:#c0c0c0;
    border-top:2px solid #fff; border-left:2px solid #fff;
    border-right:2px solid #404040; border-bottom:2px solid #404040; cursor:pointer;
  }
  .cf input[type=range]::-moz-range-thumb {
    width:11px; height:18px; background:#c0c0c0; border-radius:0;
    border-top:2px solid #fff; border-left:2px solid #fff;
    border-right:2px solid #404040; border-bottom:2px solid #404040; cursor:pointer;
  }
  .csep { width:1px; height:26px; background:#808080; border-right:1px solid #fff; margin:0 2px; }
  .cbtn {
    padding:2px 8px; background:#c0c0c0; cursor:pointer; font-family:'Courier New',monospace; font-size:11px;
    border-top:2px solid #fff; border-left:2px solid #fff;
    border-right:2px solid #404040; border-bottom:2px solid #404040; white-space:nowrap;
  }
  .cbtn:active {
    border-top:2px solid #404040; border-left:2px solid #404040;
    border-right:2px solid #fff; border-bottom:2px solid #fff;
  }

  /* ── CONFIG OVERLAY ── */
  #config-overlay {
    position:fixed; inset:0; background:rgba(0,80,25,0.97);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px; z-index:9999; padding:32px;
  }
  #config-overlay.hidden { display:none; }
  .cfg-title { font-family:'Bebas Neue',sans-serif; font-size:32px; letter-spacing:.1em; color:#fff; }
  .cfg-sub { font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:rgba(255,255,255,.45); text-align:center; line-height:2; }
  .cfg-input { width:100%; max-width:500px; padding:10px 12px; background:#fff; border-top:2px solid #404040; border-left:2px solid #404040; border-right:2px solid #fff; border-bottom:2px solid #fff; font-size:13px; outline:none; font-family:'Courier New',monospace; }
  .cfg-btn { padding:10px 36px; background:#c0c0c0; border-top:2px solid #fff; border-left:2px solid #fff; border-right:2px solid #404040; border-bottom:2px solid #404040; font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:.15em; cursor:pointer; }
  .cfg-note { font-size:11px; color:rgba(255,255,255,.3); text-align:center; }
</style>
</head>
<body>

<!-- CONFIG -->
<div id="config-overlay">
  <div class="cfg-title">CONFIGURA FIREBASE</div>
  <div class="cfg-sub">Incolla il Firebase Realtime Database URL</div>
  <input class="cfg-input" id="db-url-input" type="url" placeholder="https://nome-default-rtdb.firebaseio.com">
  <button class="cfg-btn" onclick="saveConfig()">AVVIA WALL</button>
  <div class="cfg-note">Salvato in locale · <span style="color:rgba(255,220,0,.7);cursor:pointer" onclick="localStorage.removeItem('dj_db_url');location.reload()">reset</span></div>
</div>

<!-- WAIT SCREEN (fuori dal canvas, overlay a tutto schermo) -->
<div id="wait-screen">
  <div class="qr-wrap"><img id="qr-img" src="" alt="QR"></div>
</div>

<!-- CANVAS (il wall vero) -->
<div id="canvas">
  <div id="wall"></div>
  <span id="status-msg" style="display:none"></span>
  <div id="flash"></div>
</div>

<div id="counter">Foto <b id="count">0</b></div>

<!-- CONTROL PANEL -->
<div id="ctrl-panel">
  <div class="ctrl-win">
    <div class="ctrl-bar">⚙ Display Properties</div>
    <div class="ctrl-body">
      <div class="cf">
        <label>Foto:</label>
        <input type="range" id="sl-size" min="20" max="300" value="100">
        <input type="number" id="in-size" min="20" max="300" value="100">
        <label>%</label>
      </div>
      <div class="csep"></div>
      <div class="cf">
        <label>Canvas W:</label>
        <input type="number" id="in-cw" placeholder="auto" min="400" max="7680">
        <label>H:</label>
        <input type="number" id="in-ch" placeholder="auto" min="300" max="4320">
        <label>px</label>
        <button class="cbtn" onclick="applyCanvas()">Apply</button>
      </div>
      <div class="csep"></div>
      <div class="cf">
        <label>Durata:</label>
        <input type="number" id="in-life" min="3" max="120" value="22">
        <label>sec</label>
        <button class="cbtn" onclick="applyLife()">Apply</button>
      </div>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────
var PHOTO_LIFE   = 22000;
var MAX_CARDS    = 14;
var BASE_W       = 170;   // larghezza base card in px (a 100%)
var photoScale   = 1.0;   // scala corrente (da slider)
var cards        = [];
var total        = 0;
var firstPhoto   = true;
var seenKeys     = {};

// ─── CANVAS SETUP ────────────────────────────────────────
var canvasEl = document.getElementById('canvas');
var wallEl   = document.getElementById('wall');

// Default: riempi la finestra del browser
function setCanvasSize(w, h) {
  canvasEl.style.width  = (w || window.innerWidth)  + 'px';
  canvasEl.style.height = (h || window.innerHeight) + 'px';
}
setCanvasSize();
window.addEventListener('resize', function() {
  var cw = parseInt(document.getElementById('in-cw').value) || 0;
  var ch = parseInt(document.getElementById('in-ch').value) || 0;
  if (!cw && !ch) setCanvasSize();
});

function applyCanvas() {
  var cw = parseInt(document.getElementById('in-cw').value) || 0;
  var ch = parseInt(document.getElementById('in-ch').value) || 0;
  setCanvasSize(cw || null, ch || null);
}

function applyLife() {
  var v = parseInt(document.getElementById('in-life').value) || 22;
  PHOTO_LIFE = Math.max(3, v) * 1000;
}

// ─── SLIDER ──────────────────────────────────────────────
var slSize = document.getElementById('sl-size');
var inSize = document.getElementById('in-size');

function applyScale(val) {
  val = Math.min(300, Math.max(20, parseInt(val) || 100));
  photoScale = val / 100;
  slSize.value = val;
  inSize.value = val;
  // Aggiorna tutte le card esistenti — centrato perché transform-origin:center center
  cards.forEach(function(c) {
    if (!c.el.classList.contains('dying')) {
      c.el.style.transform = 'scale(' + photoScale + ')';
    }
  });
}

slSize.addEventListener('input',  function() { applyScale(this.value); });
inSize.addEventListener('change', function() { applyScale(this.value); });
inSize.addEventListener('keydown', function(e) { if (e.key==='Enter') applyScale(this.value); });

// ─── FIREBASE CONFIG ─────────────────────────────────────
var saved = localStorage.getItem('dj_db_url');
if (saved) {
  document.getElementById('config-overlay').classList.add('hidden');
  startWall(saved);
}

function saveConfig() {
  var val = document.getElementById('db-url-input').value.trim().replace(/\/$/, '');
  if (!val.startsWith('https://')) { alert('URL non valido'); return; }
  localStorage.setItem('dj_db_url', val);
  document.getElementById('config-overlay').classList.add('hidden');
  startWall(val);
}

function startWall(dbUrl) {
  var base = location.href.replace(/wall\.html.*$/, '');
  var camUrl = base + 'camera.html?db=' + encodeURIComponent(dbUrl);
  var qr = document.getElementById('qr-img');
  qr.src = 'https://api.qrserver.com/v1/create-qr-code/?size=500x500&margin=10&data=' + encodeURIComponent(camUrl);
  qr.onerror = function() { qr.src = 'https://quickchart.io/qr?size=500&text=' + encodeURIComponent(camUrl); };
  listenPhotos(dbUrl);
}

// ─── FIREBASE POLLING ────────────────────────────────────
function setStatus(msg, col) {
  var el = document.getElementById('status-msg');
  if (el) { el.textContent = msg; el.style.color = col || 'rgba(0,0,0,0.4)'; }
}

function listenPhotos(dbUrl) {
  setStatus('Connesso · in attesa di foto…');
  setInterval(function() {
    fetch(dbUrl + '/photos.json')
      .then(function(r) {
        if (r.status===401||r.status===403) { setStatus('⚠ Accesso negato — controlla le regole Firebase','#900'); return null; }
        if (!r.ok) { setStatus('Errore HTTP '+r.status,'#900'); return null; }
        return r.json();
      })
      .then(function(data) {
        if (!data) return;
        Object.keys(data).forEach(function(key) {
          if (data[key] && !seenKeys[key]) {
            seenKeys[key] = true;
            addPhoto(data[key].dataUrl);
            fetch(dbUrl + '/photos/' + key + '.json', { method:'DELETE' });
          }
        });
      })
      .catch(function(e) { setStatus('Errore: '+e.message,'#900'); });
  }, 1500);
}

// ─── HERO → SPAWN ────────────────────────────────────────
// La card viene creata subito al centro (grande), poi si anima
// verso la posizione finale rimpicciolendosi con CSS transition.
var flashEl = document.getElementById('flash');
var waitEl  = document.getElementById('wait-screen');
var countEl = document.getElementById('count');

function addPhoto(dataUrl) {
  if (!dataUrl) return;
  if (firstPhoto) { waitEl.classList.add('hidden'); firstPhoto = false; }

  flashEl.classList.add('on');
  setTimeout(function() { flashEl.classList.remove('on'); }, 100);

  if (cards.length >= MAX_CARDS) removeCard(cards[0]);

  var WW = canvasEl.offsetWidth;
  var HH = canvasEl.offsetHeight;
  var PANEL_H = 60;

  // Dimensione card in px (base * slider)
  var cardW = Math.round(BASE_W * photoScale);
  var cardH = Math.round(cardW * (1.0 + Math.random() * 0.5) + 20); // +20 titlebar

  // Posizione finale casuale
  var finalX = Math.random() * (WW - cardW - 10) + 5;
  var finalY = Math.random() * (HH - cardH - PANEL_H - 5) + 5;

  // Posizione iniziale = centro canvas, scalata grande
  var heroScale = Math.min(WW, HH) * 0.55 / cardW; // quanto dev'essere grande al centro
  var startX = (WW - cardW) / 2;
  var startY = (HH - cardH) / 2;

  var num = String(total + 1).padStart(3, '0');

  var el = document.createElement('div');
  el.className = 'photo-card';
  // Posizione iniziale = centro; transform = grande
  el.style.cssText = [
    'left:' + startX + 'px',
    'top:' + startY + 'px',
    'width:' + cardW + 'px',
    'height:' + cardH + 'px',
    'transform:scale(' + heroScale + ')',
    'z-index:' + (100 + total),
    // transizione per l'animazione hero→small
    'transition:transform 0.7s cubic-bezier(.4,0,.2,1), left 0.7s cubic-bezier(.4,0,.2,1), top 0.7s cubic-bezier(.4,0,.2,1)',
  ].join(';');

  el.innerHTML =
    '<div class="win95" style="width:100%;height:100%;display:flex;flex-direction:column;">' +
      '<div class="win95-bar" style="flex-shrink:0;">' +
        '<div class="win95-bar-left"><span class="win95-dot"></span><span>foto_' + num + '.jpg</span></div>' +
        '<div class="win95-btns"><div class="win95-btn">_</div><div class="win95-btn">□</div><div class="win95-btn">✕</div></div>' +
      '</div>' +
      '<div class="win95-body" style="flex:1;">' +
        '<img src="' + dataUrl + '">' +
      '</div>' +
    '</div>';

  wallEl.appendChild(el);
  total++;
  countEl.textContent = total;

  // Velocità per il bounce
  var speed = 0.7 + Math.random() * 1.1;
  var angle = Math.random() * Math.PI * 2;

  var obj = {
    el: el,
    x: startX, y: startY,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    w: cardW, h: cardH,
    animating: true   // true = in fase hero, non fluttua ancora
  };
  cards.push(obj);

  // Dopo 1 frame, anima verso posizione finale e scala normale
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      el.style.left      = finalX + 'px';
      el.style.top       = finalY + 'px';
      el.style.transform = 'scale(' + photoScale + ')';
      obj.x = finalX;
      obj.y = finalY;

      // Quando l'animazione finisce, passa al controllo JS (bounce)
      setTimeout(function() {
        obj.animating = false;
        // Rimuovi la transition position — da qui la gestisce il loop
        el.style.transition = 'transform 0.35s ease';
      }, 750);
    });
  });

  // Morte programmata
  setTimeout(function() { removeCard(obj); }, PHOTO_LIFE);
}

function removeCard(obj) {
  var idx = cards.indexOf(obj);
  if (idx === -1) return;
  cards.splice(idx, 1);
  obj.animating = true; // blocca il loop
  obj.el.style.transition = 'opacity 1.4s ease, transform 1.4s ease';
  obj.el.style.opacity = '0';
  obj.el.style.transform = 'scale(0.55)';
  setTimeout(function() { if (obj.el.parentNode) obj.el.parentNode.removeChild(obj.el); }, 1500);
}

// ─── ANIMATION LOOP (bounce) ─────────────────────────────
function loop() {
  var WW = canvasEl.offsetWidth;
  var HH = canvasEl.offsetHeight;
  var PAD = 60; // pannello in basso

  for (var i = 0; i < cards.length; i++) {
    var c = cards[i];
    if (c.animating) continue;

    c.x += c.vx;
    c.y += c.vy;

    // Bordi
    if (c.x <= 0)            { c.x = 0;          c.vx =  Math.abs(c.vx); }
    if (c.x + c.w >= WW)     { c.x = WW - c.w;   c.vx = -Math.abs(c.vx); }
    if (c.y <= 0)            { c.y = 0;          c.vy =  Math.abs(c.vy); }
    if (c.y + c.h >= HH-PAD) { c.y = HH-PAD-c.h; c.vy = -Math.abs(c.vy); }

    // Collisioni tra card
    for (var j = i + 1; j < cards.length; j++) {
      var d = cards[j];
      if (d.animating) continue;
      var ox = Math.min(c.x+c.w, d.x+d.w) - Math.max(c.x, d.x);
      var oy = Math.min(c.y+c.h, d.y+d.h) - Math.max(c.y, d.y);
      if (ox > 0 && oy > 0) {
        if (ox < oy) { var t=c.vx; c.vx=d.vx; d.vx=t; c.x+=c.vx; d.x+=d.vx; }
        else         { var t=c.vy; c.vy=d.vy; d.vy=t; c.y+=c.vy; d.y+=d.vy; }
      }
    }

    // Aggiorna posizione senza transition (già rimossa dopo hero)
    c.el.style.left = c.x + 'px';
    c.el.style.top  = c.y + 'px';
  }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
