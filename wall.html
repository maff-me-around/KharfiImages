<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WALL</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #00B140;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Courier New', monospace;
  }

  /* scanlines */
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:1;
    background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);
  }

  /* ── WAIT SCREEN ── */
  #wait-screen {
    position:fixed; inset:0; z-index:900;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:28px;
    background:#00B140; transition:opacity 1s ease;
  }
  #wait-screen.hidden { opacity:0; pointer-events:none; }
  .logo { font-family:'Bebas Neue',sans-serif; font-size:clamp(56px,11vw,130px); letter-spacing:0.08em; line-height:0.88; color:#fff; text-align:center; text-shadow:2px 2px 0 rgba(0,0,0,0.3); }
  .logo em { color:#000; font-style:normal; }
  .qr-wrap { background:#fff; padding:14px; border-top:2px solid #fff; border-left:2px solid #fff; border-right:2px solid #404040; border-bottom:2px solid #404040; box-shadow:2px 2px 0 #000; display:inline-block; line-height:0; }
  #qr-img { width:180px; height:180px; display:block; }
  .qr-label { font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:rgba(0,0,0,0.5); text-align:center; margin-top:8px; }
  .pulse { display:flex; gap:8px; align-items:center; font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:rgba(0,0,0,0.45); }
  .pulse-dot { width:6px; height:6px; border-radius:50%; background:#000; animation:pd 1.4s ease-in-out infinite; }
  @keyframes pd { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.2;transform:scale(0.5)} }

  /* ── HERO ── */
  #hero-overlay {
    position:fixed; inset:0; z-index:800;
    display:flex; align-items:center; justify-content:center;
    pointer-events:none;
  }
  .hero-win {
    animation: hIn .35s cubic-bezier(.22,1,.36,1) forwards, hOut .5s ease 2.3s forwards;
  }
  @keyframes hIn  { from{opacity:0;transform:scale(.5)} to{opacity:1;transform:scale(1)} }
  @keyframes hOut { from{opacity:1;transform:scale(1)} to{opacity:0;transform:scale(.25) translateY(80px)} }

  /* ── WIN95 ── */
  .win95 {
    background:#c0c0c0;
    border-top:2px solid #fff; border-left:2px solid #fff;
    border-right:2px solid #404040; border-bottom:2px solid #404040;
    box-shadow:2px 2px 0 #000;
  }
  .win95-bar {
    background:linear-gradient(90deg,#000080,#1084d0);
    color:#fff; padding:2px 4px;
    display:flex; align-items:center; justify-content:space-between;
    font-size:11px; font-weight:bold; font-family:'Courier New',monospace;
    user-select:none; white-space:nowrap;
  }
  .win95-bar-left { display:flex; align-items:center; gap:3px; }
  .win95-dot { width:12px; height:12px; background:#ff2060; display:inline-block; flex-shrink:0; }
  .win95-btns { display:flex; gap:2px; }
  .win95-btn {
    width:15px; height:13px; background:#c0c0c0;
    border-top:1px solid #fff; border-left:1px solid #fff;
    border-right:1px solid #404040; border-bottom:1px solid #404040;
    font-size:8px; display:flex; align-items:center; justify-content:center; color:#000;
  }
  .win95-body {
    border-top:2px solid #404040; border-left:2px solid #404040;
    border-right:2px solid #fff; border-bottom:2px solid #fff;
    padding:2px; background:#c0c0c0; line-height:0;
  }
  .win95-body img { display:block; object-fit:cover; }

  /* ── FLOATING CARDS ── */
  #wall { position:fixed; inset:0; z-index:10; overflow:hidden; }

  .photo-card {
    position:absolute;
    cursor:default;
    transition: box-shadow .2s;
  }
  .photo-card:hover .win95 {
    box-shadow:4px 4px 0 #000, 0 0 20px rgba(0,0,0,0.3);
  }
  .photo-card.dying {
    animation: cardDie 1.5s ease forwards;
  }
  @keyframes cardDie {
    to { opacity:0; transform:scale(0.7); filter:blur(4px); }
  }

  /* ── FLASH ── */
  #flash { position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:850; transition:opacity .05s; }
  #flash.on { opacity:.12; }

  /* ── COUNTER ── */
  #counter {
    position:fixed; top:12px; right:16px; z-index:950;
    font-family:'Courier New',monospace; font-size:11px; color:rgba(0,0,0,0.35);
  }
  #counter b { color:#000; }

  /* ── CONTROL PANEL ── */
  #ctrl-panel {
    position:fixed; bottom:12px; left:50%; transform:translateX(-50%);
    z-index:950;
  }
  .ctrl-win {
    background:#c0c0c0;
    border-top:2px solid #fff; border-left:2px solid #fff;
    border-right:2px solid #404040; border-bottom:2px solid #404040;
    box-shadow:2px 2px 0 #000;
    min-width:520px;
  }
  .ctrl-bar {
    background:linear-gradient(90deg,#000080,#1084d0);
    color:#fff; padding:2px 6px; font-size:11px; font-weight:bold;
    font-family:'Courier New',monospace;
    display:flex; align-items:center; gap:4px;
  }
  .ctrl-body {
    padding:8px 12px; display:flex; align-items:center; gap:16px; flex-wrap:wrap;
  }
  .ctrl-field { display:flex; align-items:center; gap:5px; font-size:11px; color:#000; }
  .ctrl-field label { white-space:nowrap; }
  .ctrl-field input[type=number], .ctrl-field input[type=range] {
    font-family:'Courier New',monospace; font-size:11px;
  }
  .ctrl-field input[type=number] {
    width:56px; padding:1px 4px; background:#fff;
    border-top:2px solid #404040; border-left:2px solid #404040;
    border-right:2px solid #fff; border-bottom:2px solid #fff;
    outline:none;
  }
  .ctrl-field input[type=range] {
    width:100px; -webkit-appearance:none; appearance:none; height:4px;
    background:#808080; border-top:1px solid #404040; border-left:1px solid #404040;
    border-right:1px solid #fff; border-bottom:1px solid #fff; outline:none; cursor:pointer;
  }
  .ctrl-field input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; width:11px; height:18px; background:#c0c0c0;
    border-top:2px solid #fff; border-left:2px solid #fff;
    border-right:2px solid #404040; border-bottom:2px solid #404040; cursor:pointer;
  }
  .ctrl-sep { width:1px; height:28px; background:#808080; border-right:1px solid #fff; }
  .ctrl-btn {
    padding:2px 10px; background:#c0c0c0; cursor:pointer; font-family:'Courier New',monospace; font-size:11px;
    border-top:2px solid #fff; border-left:2px solid #fff;
    border-right:2px solid #404040; border-bottom:2px solid #404040;
    white-space:nowrap;
  }
  .ctrl-btn:active { border-top:2px solid #404040; border-left:2px solid #404040; border-right:2px solid #fff; border-bottom:2px solid #fff; }

  /* ── CONFIG OVERLAY ── */
  #config-overlay {
    position:fixed; inset:0; background:rgba(0,90,32,0.97);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px; z-index:9999; padding:32px;
  }
  #config-overlay.hidden { display:none; }
  .cfg-title { font-family:'Bebas Neue',sans-serif; font-size:32px; letter-spacing:.1em; color:#fff; }
  .cfg-sub { font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:rgba(255,255,255,.5); text-align:center; line-height:2; }
  .cfg-input { width:100%; max-width:500px; padding:12px 14px; background:#fff; border-top:2px solid #404040; border-left:2px solid #404040; border-right:2px solid #fff; border-bottom:2px solid #fff; font-size:13px; outline:none; font-family:'Courier New',monospace; }
  .cfg-btn { padding:10px 36px; background:#c0c0c0; border-top:2px solid #fff; border-left:2px solid #fff; border-right:2px solid #404040; border-bottom:2px solid #404040; font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:.15em; cursor:pointer; }
  .cfg-note { font-size:11px; color:rgba(255,255,255,.3); text-align:center; }
</style>
</head>
<body>

<!-- CONFIG -->
<div id="config-overlay">
  <div class="cfg-title">CONFIGURA FIREBASE</div>
  <div class="cfg-sub">Incolla il Firebase Realtime Database URL</div>
  <input class="cfg-input" id="db-url-input" type="url" placeholder="https://nome-default-rtdb.firebaseio.com">
  <button class="cfg-btn" onclick="saveConfig()">AVVIA WALL</button>
  <div class="cfg-note">Salvato in locale · <span style="color:rgba(255,200,0,.7);cursor:pointer" onclick="localStorage.removeItem('dj_db_url');location.reload()">reset</span></div>
</div>

<!-- WAIT -->
<div id="wait-screen">
  <div class="logo">SHOOT<br>THE<br><em>NIGHT</em></div>
  <div>
    <div class="qr-wrap"><img id="qr-img" src="" alt="QR"></div>
    <div class="qr-label">Scansiona &amp; invia la tua foto</div>
  </div>
  <div class="pulse"><div class="pulse-dot"></div><span id="status-msg">In attesa…</span></div>
</div>

<!-- HERO -->
<div id="hero-overlay"></div>

<!-- WALL -->
<div id="wall"></div>
<div id="flash"></div>
<div id="counter">Foto <b id="count">0</b></div>

<!-- CONTROL PANEL -->
<div id="ctrl-panel">
  <div class="ctrl-win">
    <div class="ctrl-bar">⚙ Display Properties</div>
    <div class="ctrl-body">

      <div class="ctrl-field">
        <label>Dimensione:</label>
        <input type="range" id="sl-size" min="30" max="300" value="100">
        <input type="number" id="in-size" min="30" max="300" value="100">
        <label>%</label>
      </div>

      <div class="ctrl-sep"></div>

      <div class="ctrl-field">
        <label>Canvas W:</label>
        <input type="number" id="in-w" placeholder="auto" min="400" max="7680">
        <label>px</label>
      </div>
      <div class="ctrl-field">
        <label>H:</label>
        <input type="number" id="in-h" placeholder="auto" min="300" max="4320">
        <label>px</label>
      </div>
      <button class="ctrl-btn" onclick="applyCanvas()">Apply</button>

      <div class="ctrl-sep"></div>

      <div class="ctrl-field">
        <label>Durata:</label>
        <input type="number" id="in-life" min="5" max="120" value="22">
        <label>sec</label>
      </div>
      <button class="ctrl-btn" onclick="applyLife()">Apply</button>

    </div>
  </div>
</div>

<script>
// ── STATE ────────────────────────────────────────────
var PHOTO_LIFE    = 22000;
var MAX_CARDS     = 14;
var photoSizePct  = 100;   // % rispetto alla base
var BASE_W        = 160;   // larghezza base foto in px
var cards         = [];    // [{el, x, y, vx, vy, w, h}]
var total         = 0;
var firstPhoto    = true;
var seenKeys      = {};
var animRunning   = false;

// ── CONTROLS ─────────────────────────────────────────
var slSize  = document.getElementById('sl-size');
var inSize  = document.getElementById('in-size');
var inW     = document.getElementById('in-w');
var inH     = document.getElementById('in-h');
var inLife  = document.getElementById('in-life');

// Slider ↔ input sync
slSize.addEventListener('input', function() {
  inSize.value = this.value;
  photoSizePct = parseInt(this.value);
  resizeAllCards();
});
inSize.addEventListener('change', function() {
  var v = Math.min(300, Math.max(30, parseInt(this.value)||100));
  this.value = v; slSize.value = v;
  photoSizePct = v;
  resizeAllCards();
});

function resizeAllCards() {
  var scale = photoSizePct / 100;
  cards.forEach(function(c) {
    c.w = Math.round(BASE_W * scale);
    c.h = Math.round(c.w * 1.3);
    c.el.style.width  = c.w + 'px';
    c.el.style.height = c.h + 'px';
  });
}

function applyCanvas() {
  var w = parseInt(inW.value) || 0;
  var h = parseInt(inH.value) || 0;
  document.body.style.width  = w > 0 ? w+'px' : '100vw';
  document.body.style.height = h > 0 ? h+'px' : '100vh';
  document.getElementById('wall').style.width  = w > 0 ? w+'px' : '100%';
  document.getElementById('wall').style.height = h > 0 ? h+'px' : '100%';
}

function applyLife() {
  var v = parseInt(inLife.value) || 22;
  PHOTO_LIFE = Math.max(5, v) * 1000;
}

// ── CONFIG ───────────────────────────────────────────
var saved = localStorage.getItem('dj_db_url');
if (saved) {
  document.getElementById('config-overlay').classList.add('hidden');
  startWall(saved);
}

function saveConfig() {
  var val = document.getElementById('db-url-input').value.trim().replace(/\/$/, '');
  if (!val.startsWith('https://')) { alert('URL non valido'); return; }
  localStorage.setItem('dj_db_url', val);
  document.getElementById('config-overlay').classList.add('hidden');
  startWall(val);
}

function startWall(dbUrl) {
  var base = location.href.replace(/wall\.html.*$/, '');
  var camUrl = base + 'camera.html?db=' + encodeURIComponent(dbUrl);
  var qr = document.getElementById('qr-img');
  qr.src = 'https://api.qrserver.com/v1/create-qr-code/?size=180x180&margin=10&data=' + encodeURIComponent(camUrl);
  qr.onerror = function() { qr.src = 'https://quickchart.io/qr?size=180&text=' + encodeURIComponent(camUrl); };
  listenPhotos(dbUrl);
}

// ── FIREBASE ─────────────────────────────────────────
function setStatus(msg, col) {
  var el = document.getElementById('status-msg');
  if (el) { el.textContent = msg; el.style.color = col || 'rgba(0,0,0,0.4)'; }
}

function listenPhotos(dbUrl) {
  setStatus('Connesso · in attesa di foto…');
  setInterval(function() {
    fetch(dbUrl + '/photos.json')
      .then(function(r) {
        if (r.status===401||r.status===403) { setStatus('⚠ Accesso negato — controlla le regole Firebase','#900'); return null; }
        if (!r.ok) { setStatus('Errore HTTP '+r.status,'#900'); return null; }
        return r.json();
      })
      .then(function(data) {
        if (!data) return;
        Object.keys(data).forEach(function(key) {
          if (data[key] && !seenKeys[key]) {
            seenKeys[key] = true;
            addPhoto(data[key].dataUrl);
            fetch(dbUrl + '/photos/' + key + '.json', { method:'DELETE' });
          }
        });
      })
      .catch(function(e) { setStatus('Errore: '+e.message,'#900'); });
  }, 1500);
}

// ── HERO ─────────────────────────────────────────────
var heroEl = document.getElementById('hero-overlay');

function showHero(dataUrl, cb) {
  var hw = Math.round(Math.min(window.innerWidth * 0.52, 460));
  var hh = Math.round(hw * 1.35);
  var num = String(total+1).padStart(4,'0');

  var win = document.createElement('div');
  win.className = 'hero-win';
  win.innerHTML =
    '<div class="win95" style="width:'+(hw+8)+'px">' +
      '<div class="win95-bar">' +
        '<div class="win95-bar-left"><span class="win95-dot"></span> PHOTO_'+num+'.JPG</div>' +
        '<div class="win95-btns"><div class="win95-btn">_</div><div class="win95-btn">□</div><div class="win95-btn">✕</div></div>' +
      '</div>' +
      '<div class="win95-body"><img src="'+dataUrl+'" style="width:'+hw+'px;height:'+hh+'px;"></div>' +
    '</div>';

  heroEl.innerHTML = '';
  heroEl.appendChild(win);
  setTimeout(function() { heroEl.innerHTML = ''; if(cb) cb(); }, 3000);
}

// ── SPAWN FLOATING CARD ───────────────────────────────
var wall    = document.getElementById('wall');
var waitEl  = document.getElementById('wait-screen');
var countEl = document.getElementById('count');
var flashEl = document.getElementById('flash');

function addPhoto(dataUrl) {
  if (!dataUrl) return;
  if (firstPhoto) { waitEl.classList.add('hidden'); firstPhoto = false; if(!animRunning) startLoop(); }

  flashEl.classList.add('on');
  setTimeout(function() { flashEl.classList.remove('on'); }, 100);

  showHero(dataUrl, function() { spawnCard(dataUrl); });
}

function spawnCard(dataUrl) {
  // Rimuovi la più vecchia se troppe
  if (cards.length >= MAX_CARDS) removeCard(cards[0]);

  var scale = photoSizePct / 100;
  var w = Math.round(BASE_W * scale);
  var h = Math.round(w * (0.9 + Math.random() * 0.5)); // ratio variabile

  var WW = wall.offsetWidth  || window.innerWidth;
  var HH = wall.offsetHeight || window.innerHeight;

  // Posizione iniziale casuale (dentro il canvas)
  var x = Math.random() * (WW - w);
  var y = Math.random() * (HH - h - 60); // evita il pannello sotto

  // Velocità casuale (px/frame a 60fps)
  var speed = 0.8 + Math.random() * 1.2;
  var angle = Math.random() * Math.PI * 2;
  var vx = Math.cos(angle) * speed;
  var vy = Math.sin(angle) * speed;

  var num = String(total+1).padStart(3,'0');

  var el = document.createElement('div');
  el.className = 'photo-card';
  el.style.cssText = 'left:'+x+'px;top:'+y+'px;width:'+w+'px;height:'+(h+20)+'px;';
  el.innerHTML =
    '<div class="win95" style="width:100%;height:100%;display:flex;flex-direction:column;">' +
      '<div class="win95-bar" style="flex-shrink:0;">' +
        '<div class="win95-bar-left"><span class="win95-dot"></span> foto_'+num+'.jpg</div>' +
        '<div class="win95-btns"><div class="win95-btn">✕</div></div>' +
      '</div>' +
      '<div class="win95-body" style="flex:1;padding:2px;">' +
        '<img src="'+dataUrl+'" style="width:100%;height:100%;object-fit:cover;">' +
      '</div>' +
    '</div>';

  wall.appendChild(el);

  var obj = { el:el, x:x, y:y, vx:vx, vy:vy, w:w, h:h+20, born:Date.now() };
  cards.push(obj);

  total++;
  countEl.textContent = total;

  // Morte programmata
  var life = PHOTO_LIFE;
  setTimeout(function() { removeCard(obj); }, life);
}

function removeCard(obj) {
  var idx = cards.indexOf(obj);
  if (idx === -1) return;
  cards.splice(idx, 1);
  obj.el.classList.add('dying');
  setTimeout(function() { if(obj.el.parentNode) obj.el.parentNode.removeChild(obj.el); }, 1600);
}

// ── ANIMATION LOOP ────────────────────────────────────
animRunning = false;

function startLoop() {
  animRunning = true;
  requestAnimationFrame(loop);
}

function loop() {
  var WW = wall.offsetWidth  || window.innerWidth;
  var HH = wall.offsetHeight || window.innerHeight;
  var PANEL_H = 60; // altezza pannello in basso

  for (var i = 0; i < cards.length; i++) {
    var c = cards[i];
    if (c.el.classList.contains('dying')) continue;

    c.x += c.vx;
    c.y += c.vy;

    // Rimbalzo bordi
    if (c.x <= 0) { c.x = 0; c.vx = Math.abs(c.vx); }
    if (c.x + c.w >= WW) { c.x = WW - c.w; c.vx = -Math.abs(c.vx); }
    if (c.y <= 0) { c.y = 0; c.vy = Math.abs(c.vy); }
    if (c.y + c.h >= HH - PANEL_H) { c.y = HH - PANEL_H - c.h; c.vy = -Math.abs(c.vy); }

    // Rimbalzo tra card (collision semplice)
    for (var j = i+1; j < cards.length; j++) {
      var d = cards[j];
      if (d.el.classList.contains('dying')) continue;
      var ox = Math.min(c.x+c.w, d.x+d.w) - Math.max(c.x, d.x);
      var oy = Math.min(c.y+c.h, d.y+d.h) - Math.max(c.y, d.y);
      if (ox > 0 && oy > 0) {
        // Scambia velocità sull'asse di minima sovrapposizione
        if (ox < oy) {
          var tmp = c.vx; c.vx = d.vx; d.vx = tmp;
          c.x += c.vx; d.x += d.vx;
        } else {
          var tmp = c.vy; c.vy = d.vy; d.vy = tmp;
          c.y += c.vy; d.y += d.vy;
        }
      }
    }

    c.el.style.left = c.x + 'px';
    c.el.style.top  = c.y + 'px';
  }

  requestAnimationFrame(loop);
}

// Avvia il loop subito (anche senza foto, pronto)
startLoop();
</script>
</body>
</html>
